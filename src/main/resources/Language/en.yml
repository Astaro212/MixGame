HelpMessages:
  adminHelp:
    - '<--- &cMixGame &eAdmin Help --->'
    - '&cCreate arena: &f/colorfulmix create <arenaName>'
    - '&cEdit arena: &f/colorfulmix edit <arenaName>'
    - '&cSet Floor Material: &f/colorfulmix setFloorMaterial <WOOL, CLAY, CONCRETE, MIX>'
    - '&cSet sign: &f/colorfulmix setSign <arenaName>'
    - '&cSets min players: &f/colorfulmix setMinPlayers <count>'
    - '&cSets max players: &f/colorfulmix setMaxPlayers <count>'
    - '&cSet difficulty level: &f/colorfulmix setLevel <1-5>'
    - '&cSet size of section: &f/colorfulmix setSectionSize <1-5>'
    - '&cSet color limits: &f/colorfulmix setColorLimit <2-16>'
    - '&cSet collision: &f/colorfulmix setCollision <true, false>'
    - '&cDelete an arena: &f/cfm delete <arenaName>'
    - '&7(Use these commands to fully setup your arena)'
  playerHelp:
    - '<--- &cMixGame &eHelp --->'
    - '&cTo join an arena: &f/mixgame join <arenaName>'
    - '&cTo leave an arena: &f/mixgame leave'
    - '&cShow stats: &f/mixgame stats'
Titles:
  roundStart:
    title: "<gold>РАУНД %round%"
    subtitle: "<white>Приготовьтесь бежать!"
    fadeIn: 10
    stay: 40
    fadeOut: 10
  winner:
    title: "<yellow>ПОБЕДА!"
    subtitle: "<white>Игрок <green>%player%</green> выиграл матч"
    fadeIn: 20
    stay: 100
    fadeOut: 20
  loser:
    title: "<yellow>Вы проиграли!"
    subtitle: "<white>Теперь вы наблюдатель."
    fadeIn: 20
    stay: 100
    fadeOut: 20